# Workspace root. Each package under packages/ and apps/ is independently
# pip-installable; this file declares the workspace for uv and groups dev
# tooling.

[tool.uv.workspace]
members = [
    "packages/maverick-core",
    "packages/maverick-shield",
    "packages/maverick-channels",
    "apps/installer-cli",
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
# E/F/W: pycodestyle errors, pyflakes (real bugs), pycodestyle warnings.
# I (isort) intentionally dropped -- it kept generating cosmetic noise on a
# clean codebase. Re-enable as its own focused cleanup PR with --fix.
# B (bugbear) and UP (pyupgrade) also off until we commit to those styles.
select = ["E", "F", "W"]
ignore = ["E501"]  # line length

[tool.pytest.ini_options]
testpaths = ["packages", "apps"]
python_files = "test_*.py"
addopts = "--import-mode=importlib"
