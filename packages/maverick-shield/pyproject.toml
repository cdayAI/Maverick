[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "maverick-shield"
version = "0.1.0"
description = "Agent Shield integration for Maverick"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "texasreaper62" }]
readme = "README.md"
dependencies = [
    "agent-shield>=14.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["maverick_shield*"]
