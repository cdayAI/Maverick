[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "maverick-shield"
version = "0.1.0"
description = "Agent Shield integration for Maverick"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "texasreaper62" }]
readme = "README.md"
# Base install has no required deps so it works everywhere; the guard module
# fail-opens with a clear warning if agent-shield isn't available at runtime.
# Users who want real scanning install the [scan] extra.
dependencies = []

[project.optional-dependencies]
scan = ["agent-shield>=14.0"]

[tool.setuptools.packages.find]
where = ["."]
include = ["maverick_shield*"]
