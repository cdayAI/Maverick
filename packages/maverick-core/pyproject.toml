[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
# PyPI distribution name. The 'maverick' name was squatted on PyPI so
# we publish as 'maverick-agent'. The Python *import* name stays as
# `maverick` (see [tool.setuptools.packages.find]) and the CLI entry
# point stays `maverick` (see [project.scripts]).
name = "maverick-agent"
version = "0.1.4"
description = "Recursive multi-agent swarm for long-horizon work"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "cdayAI" }]
readme = "README.md"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "anthropic>=0.40.0",
    "click>=8.1",
    "tomli>=2.0; python_version<'3.11'",
]

[project.optional-dependencies]
openai     = ["openai>=1.30"]
openrouter = ["openai>=1.30"]
ollama     = ["openai>=1.30"]
moonshot   = ["openai>=1.30"]
deepseek   = ["openai>=1.30"]
xai        = ["openai>=1.30"]
gemini     = ["openai>=1.30"]
tgi        = ["openai>=1.30"]
vllm       = ["openai>=1.30"]
chroma     = ["chromadb>=0.4"]
qdrant     = ["qdrant-client>=1.6", "fastembed>=0.3"]
postgres   = ["psycopg[binary]>=3.1"]
math       = ["sympy>=1.12"]
pandas     = ["pandas>=2.1", "pyarrow>=15.0"]
calendar   = ["caldav>=1.3"]
session         = ["httpx>=0.27"]
chatgpt-session = ["httpx>=0.27"]
claude-session  = ["httpx>=0.27"]
kimi-session    = ["httpx>=0.27"]
grok-session    = ["httpx>=0.27"]
gemini-session  = ["httpx>=0.27"]
capture         = ["playwright>=1.40"]
browser         = ["playwright>=1.40", "lxml>=5.0"]
computer-use    = ["pillow>=12.2.0", "mss>=9.0", "pyautogui>=0.9.54"]
pdf             = ["pdfplumber>=0.10", "pypdf>=4.0"]
clipboard       = ["pyperclip>=1.8"]
voice           = ["faster-whisper>=1.0"]
notifications   = ["httpx>=0.27"]
audit-signing   = ["cryptography>=42.0"]
issue-trackers  = ["httpx>=0.27"]
youtube         = ["youtube-transcript-api>=0.6"]
mongodb         = ["pymongo>=4.6"]
redis           = ["redis>=5.0"]
s3              = ["boto3>=1.34"]
observability   = [
    "opentelemetry-api>=1.25",
    "opentelemetry-sdk>=1.25",
    "opentelemetry-exporter-otlp-proto-http>=1.25",
    "prometheus-client>=0.20",
]
shield          = ["maverick-shield"]
installer  = ["maverick-installer"]
channels   = ["maverick-channels"]
dashboard  = ["maverick-dashboard"]
mcp        = ["maverick-mcp-server"]
embeddings = ["fastembed>=0.3"]
dev        = ["pytest>=8", "pytest-asyncio>=0.23", "ruff>=0.5"]
all        = [
    "openai>=1.30",
    "fastembed>=0.3",
    "maverick-shield",
    "maverick-installer",
    "maverick-channels",
    "maverick-dashboard",
    "maverick-mcp-server",
]

[project.scripts]
maverick = "maverick.cli:main"

[project.urls]
Homepage      = "https://github.com/cdayAI/maverick"
Repository    = "https://github.com/cdayAI/maverick"
Issues        = "https://github.com/cdayAI/maverick/issues"
Changelog     = "https://github.com/cdayAI/maverick/blob/main/CHANGELOG.md"
Documentation = "https://github.com/cdayAI/maverick/tree/main/docs"

[tool.setuptools.packages.find]
where = ["."]
include = ["maverick*"]
