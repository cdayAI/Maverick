[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "maverick"
version = "0.1.0"
description = "Recursive multi-agent swarm for long-horizon work"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "texasreaper62" }]
readme = "README.md"
dependencies = [
    "anthropic>=0.40.0",
    "click>=8.1",
    "tomli>=2.0; python_version<'3.11'",
]

[project.optional-dependencies]
# Provider extras: install the SDK only if you actually pick that provider.
openai     = ["openai>=1.30"]
openrouter = ["openai>=1.30"]
ollama     = ["openai>=1.30"]
shield     = ["maverick-shield"]
installer  = ["maverick-installer"]
channels   = ["maverick-channels"]
dev        = ["pytest>=8", "pytest-asyncio>=0.23", "ruff>=0.5"]
all        = [
    "openai>=1.30",
    "maverick-shield",
    "maverick-installer",
    "maverick-channels",
]

[project.scripts]
maverick = "maverick.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["maverick*"]
