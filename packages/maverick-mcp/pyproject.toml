[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "maverick-mcp-server"
version = "0.1.3"
description = "Model Context Protocol server for Maverick (exposes the swarm to MCP clients)"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "cdayAI" }]
readme = "README.md"
dependencies = [
    "maverick-agent>=0.1.3",
]

[project.optional-dependencies]
# The streamable HTTP transport (`maverick mcp --http`) needs FastAPI +
# uvicorn. http_transport.py's ImportError tells users to install
# `maverick-mcp-server[http]`, so the extra must actually exist.
http = [
    "fastapi>=0.110",
    "uvicorn>=0.27",
]

[project.urls]
Homepage = "https://github.com/cdayAI/maverick"

[project.scripts]
maverick-mcp = "maverick_mcp.server:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["maverick_mcp*"]
