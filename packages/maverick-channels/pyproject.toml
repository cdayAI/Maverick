[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "maverick-channels"
version = "0.1.3"
description = "Channel adapters for Maverick (Telegram, Discord, Slack, Signal, ...)"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "cdayAI" }]
readme = "README.md"
dependencies = [
    "maverick-agent>=0.1.3",
]

[project.optional-dependencies]
telegram = ["python-telegram-bot>=21.0"]
discord  = ["discord.py>=2.4"]
slack    = ["slack_sdk>=3.27"]
matrix   = ["matrix-nio>=0.24"]
whatsapp = ["fastapi>=0.110", "uvicorn>=0.27", "twilio>=9.0", "python-multipart>=0.0.27"]
sms      = ["fastapi>=0.110", "uvicorn>=0.27", "twilio>=9.0", "python-multipart>=0.0.27"]
voice    = ["fastapi>=0.110", "uvicorn>=0.27", "httpx>=0.27"]
bluesky  = ["httpx>=0.27"]
mastodon = ["httpx>=0.27"]
all = [
    "python-telegram-bot>=21.0",
    "discord.py>=2.4",
    "slack_sdk>=3.27",
    "matrix-nio>=0.24",
    "fastapi>=0.110",
    "uvicorn>=0.27",
    "twilio>=9.0",
    "python-multipart>=0.0.27",
    "httpx>=0.27",
]

[project.urls]
Homepage = "https://github.com/cdayAI/maverick"

[tool.setuptools.packages.find]
where = ["."]
include = ["maverick_channels*"]
