{% extends "base.html" %}
{% block title %}facts · Maverick{% endblock %}
{% block content %}
  <h2>known facts</h2>
  <div class="panel">
    {% if facts %}
    <table>
      <thead><tr><th scope="col">key</th><th scope="col">value</th></tr></thead>
      <tbody>
      {% for k, v in facts.items() %}
        <tr><td><code>{{ k }}</code></td><td>{{ v }}</td></tr>
      {% endfor %}
      </tbody>
    </table>
    {% else %}
      <p class="muted">No facts yet. Set one with <code>maverick fact &lt;key&gt; &lt;value&gt;</code>.</p>
    {% endif %}
  </div>
{% endblock %}
