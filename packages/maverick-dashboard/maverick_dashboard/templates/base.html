<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Maverick{% endblock %}</title>
  <style>
    /* Theme presets. The body class chosen by the route + ?theme=
       query param selects the active palette. Default = dark. */
    :root,
    body.theme-dark {
      --bg: #0d1117; --panel: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #2ea043;
      --warn: #d29922; --danger: #f85149;
    }
    body.theme-light {
      --bg: #ffffff; --panel: #f6f8fa; --border: #d0d7de;
      --text: #1f2328; --muted: #59636e; --accent: #1f883d;
      --warn: #9a6700; --danger: #cf222e;
    }
    body.theme-solarized {
      --bg: #002b36; --panel: #073642; --border: #586e75;
      --text: #eee8d5; --muted: #93a1a1; --accent: #859900;
      --warn: #b58900; --danger: #dc322f;
    }
    body.theme-hicontrast {
      --bg: #000000; --panel: #111111; --border: #ffffff;
      --text: #ffffff; --muted: #cccccc; --accent: #00ff00;
      --warn: #ffff00; --danger: #ff5050;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; background: var(--bg); color: var(--text); }
    header { padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; gap: 1rem; align-items: center; }
    header h1 { margin: 0; font-size: 1.1rem; }
    nav { display: flex; gap: 1rem; }
    nav a { color: var(--muted); text-decoration: none; }
    nav a:hover, nav a.active { color: var(--text); }
    main { padding: 2rem; max-width: 1100px; margin: 0 auto; }
    h2 { margin: 0 0 1rem; font-size: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
    .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; }
    .stat .num { font-size: 2rem; }
    .stat .label { color: var(--muted); font-size: 0.85rem; text-transform: uppercase; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; font-size: 0.8rem; text-transform: uppercase; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 4px; font-size: 0.75rem; }
    .badge.active  { background: rgba(46,160,67,0.2); color: var(--accent); }
    .badge.done    { background: rgba(110,118,129,0.2); color: var(--muted); }
    .badge.blocked { background: rgba(210,153,34,0.2); color: var(--warn); }
    .badge.pending { background: rgba(139,148,158,0.15); color: var(--muted); }
    .badge.success { background: rgba(46,160,67,0.2); color: var(--accent); }
    .badge.failure { background: rgba(248,81,73,0.2); color: var(--danger); }
    code { background: var(--panel); padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.85rem; }
    .muted { color: var(--muted); }
    footer { text-align: center; color: var(--muted); padding: 2rem; font-size: 0.8rem; }
  </style>
</head>
<body class="theme-{{ theme or 'dark' }}">
  <header>
    <h1>Maverick</h1>
    <nav>
      <a href="/">overview</a>
      <a href="/chat">chat</a>
      <a href="/goals">goals</a>
      <a href="/skills">skills</a>
      <a href="/facts">facts</a>
      <a href="/spend">spend</a>
      <a href="/providers">providers</a>
    </nav>
    <span style="margin-left: auto; display: flex; gap: 0.5rem; align-items: center;">
      <span class="muted" style="font-size: 0.75rem;">theme</span>
      <a href="?theme=dark" title="Dark"><span style="display: inline-block; width: 0.8rem; height: 0.8rem; border-radius: 50%; background: #0d1117; border: 1px solid var(--border);"></span></a>
      <a href="?theme=light" title="Light"><span style="display: inline-block; width: 0.8rem; height: 0.8rem; border-radius: 50%; background: #f6f8fa; border: 1px solid var(--border);"></span></a>
      <a href="?theme=solarized" title="Solarized"><span style="display: inline-block; width: 0.8rem; height: 0.8rem; border-radius: 50%; background: #002b36; border: 1px solid var(--border);"></span></a>
      <a href="?theme=hicontrast" title="High contrast"><span style="display: inline-block; width: 0.8rem; height: 0.8rem; border-radius: 50%; background: #000; border: 1px solid #fff;"></span></a>
    </span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <span class="muted">local-only · v0.1 · ~/.maverick/world.db</span>
  </footer>
</body>
</html>
