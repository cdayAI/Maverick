[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "maverick-dashboard"
version = "0.1.2"
description = "Local web dashboard + REST API for Maverick (FastAPI + htmx)"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "cdayAI" }]
readme = "README.md"
dependencies = [
    "maverick-agent>=0.1",
    "fastapi>=0.110",
    "uvicorn>=0.27",
    "jinja2>=3.1",
    "python-multipart>=0.0.9",
]

[project.urls]
Homepage = "https://github.com/cdayAI/maverick"

[project.scripts]
maverick-dashboard = "maverick_dashboard.app:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["maverick_dashboard*"]

[tool.setuptools.package-data]
maverick_dashboard = ["templates/*.html", "static/*"]
