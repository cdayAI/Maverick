name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release as (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/maverick
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check for PyPI token
        id: token_check
        env:
          TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "no_token=true" >> "$GITHUB_OUTPUT"
            echo "PYPI_API_TOKEN not set; skipping PyPI publish."
          else
            echo "no_token=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install build tools
        if: steps.token_check.outputs.no_token == 'false'
        run: pip install build twine
      - name: Build all packages
        if: steps.token_check.outputs.no_token == 'false'
        run: |
          for pkg in packages/maverick-core packages/maverick-shield \
                    packages/maverick-channels packages/maverick-dashboard \
                    packages/maverick-mcp apps/installer-cli; do
            echo "--- building $pkg ---"
            (cd "$pkg" && python -m build)
          done
      - name: Publish to PyPI
        if: steps.token_check.outputs.no_token == 'false'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          for pkg in packages/maverick-core packages/maverick-shield \
                    packages/maverick-channels packages/maverick-dashboard \
                    packages/maverick-mcp apps/installer-cli; do
            twine upload --skip-existing "$pkg/dist/"*
          done

  binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: maverick-linux-x86_64
          - os: macos-latest
            artifact: maverick-macos-arm64
          - os: windows-latest
            artifact: maverick-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Maverick + deps
        shell: bash
        run: |
          pip install -e ./packages/maverick-core
          pip install --no-deps -e ./packages/maverick-shield
          pip install --no-deps -e ./packages/maverick-channels
          pip install --no-deps -e ./packages/maverick-dashboard
          pip install --no-deps -e ./packages/maverick-mcp
          pip install --no-deps -e ./apps/installer-cli
          # Bundled deps the --no-deps installs above skipped:
          pip install 'questionary>=2.0' 'rich>=13.7'
          pip install 'fastapi>=0.110' 'uvicorn>=0.27' 'jinja2>=3.1' 'python-multipart>=0.0.9'
          # Pin to PyInstaller 6.x: earlier major lacks Python 3.12 support,
          # later (7.x in 2025+) had API drifts we don't want to chase
          # release-by-release. 6.x is well-stabilized for Python 3.10-3.12.
          pip install 'pyinstaller>=6.0,<7.0'
      - name: Diagnostic - verify sqlite3 is importable at build time
        shell: bash
        run: |
          # Prove sqlite3 is available BEFORE pyinstaller runs. If this
          # fails, the Python install on the runner doesn't have sqlite3
          # support compiled in -- which is what would silently cause
          # --hidden-import sqlite3 to be a no-op (you can't bundle what
          # doesn't exist in the source Python). The v0.1.0/v0.1.1
          # release binaries failed precisely this way on all 3 OSes.
          python -c "import sqlite3; print('sqlite3 version:', sqlite3.sqlite_version)"
          python -c "import _sqlite3; print('_sqlite3 ok')"
      - name: Build single-file binary
        shell: bash
        working-directory: build
        run: |
          # Spec file gives the analyzer an unambiguous hiddenimports list.
          # Previous attempts via --hidden-import on the CLI silently no-op'd
          # under --collect-all interaction; the spec file pattern is what
          # the PyInstaller docs recommend for non-trivial builds.
          pyinstaller --clean --noconfirm --distpath ../dist maverick.spec
      - name: Smoke-test the binary covers all subcommands
        shell: bash
        run: |
          ./dist/maverick --help
          ./dist/maverick version
          ./dist/maverick dashboard --help
          ./dist/maverick mcp --help || true
      - name: Rename artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/maverick.exe "dist/${{ matrix.artifact }}"
          else
            mv dist/maverick "dist/${{ matrix.artifact }}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: [docker-image, binaries, pypi]
    runs-on: ubuntu-latest
    # Run if binaries built. PyPI failure (missing token) doesn't block release.
    if: always() && needs.docker-image.result == 'success' && needs.binaries.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/maverick-*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
