name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release as (e.g., v0.1.0-alpha)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/maverick
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  pypi:
    # Publishes every package in the workspace to PyPI on tag. Requires
    # PYPI_API_TOKEN secret to be set in the repo (Settings > Secrets >
    # Actions). Falls back to no-op if the token isn't configured so
    # forks don't fail.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check for PyPI token
        id: token_check
        env:
          TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "no_token=true" >> "$GITHUB_OUTPUT"
            echo "PYPI_API_TOKEN not set; skipping PyPI publish."
          else
            echo "no_token=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install build tools
        if: steps.token_check.outputs.no_token == 'false'
        run: pip install build twine
      - name: Build all packages
        if: steps.token_check.outputs.no_token == 'false'
        run: |
          for pkg in packages/maverick-core packages/maverick-shield \
                    packages/maverick-channels packages/maverick-dashboard \
                    packages/maverick-mcp apps/installer-cli; do
            echo "--- building $pkg ---"
            (cd "$pkg" && python -m build)
          done
      - name: Publish to PyPI
        if: steps.token_check.outputs.no_token == 'false'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          for pkg in packages/maverick-core packages/maverick-shield \
                    packages/maverick-channels packages/maverick-dashboard \
                    packages/maverick-mcp apps/installer-cli; do
            twine upload --skip-existing "$pkg/dist/"*
          done

  binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: maverick-linux-x86_64
          - os: macos-latest
            artifact: maverick-macos-arm64
          - os: windows-latest
            artifact: maverick-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Maverick + deps
        shell: bash
        run: |
          pip install -e ./packages/maverick-core
          pip install --no-deps -e ./packages/maverick-shield
          pip install --no-deps -e ./packages/maverick-channels
          pip install --no-deps -e ./apps/installer-cli
          pip install questionary rich pyinstaller
      - name: Build single-file binary
        shell: bash
        run: |
          pyinstaller \
            --onefile \
            --name maverick \
            --collect-all maverick \
            --collect-all maverick_shield \
            --collect-all maverick_channels \
            --collect-all maverick_installer \
            --collect-all anthropic \
            --hidden-import tomli \
            build/pyinstaller_entry.py
      - name: Rename artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/maverick.exe "dist/${{ matrix.artifact }}"
          else
            mv dist/maverick "dist/${{ matrix.artifact }}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: [docker-image, binaries, pypi]
    runs-on: ubuntu-latest
    if: always() && needs.docker-image.result == 'success' && needs.binaries.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/maverick-*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
