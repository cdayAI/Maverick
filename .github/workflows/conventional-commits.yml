name: Conventional Commits

on:
  pull_request:
    types: [opened, edited, synchronize]

# Lint PR titles against the Conventional Commits spec
# (https://www.conventionalcommits.org). Required types: feat, fix,
# chore, docs, test, refactor, perf, ci, build, style, revert.
#
# Not required for individual commit messages -- those are squash-
# merged so only the PR title shapes the merge commit.

permissions:
  pull-requests: read

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            test
            refactor
            perf
            ci
            build
            style
            revert
          requireScope: false
          subjectPattern: '^[A-Z].*$|^[a-z].*$'
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            must start with a letter.
