name: Bump Homebrew formula

# When a release is published, pin deploy/homebrew/maverick.rb to the
# freshly published maverick-agent sdist on PyPI (url + sha256), generate
# hash-locked dependency requirements, and open a PR.
# Decoupled from publish.yml so a PyPI propagation lag can't fail the release.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to pin (e.g. 0.1.6)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pin the formula to the published sdist
        env:
          VERSION: ${{ github.event.inputs.version || github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import json, os, pathlib, re, subprocess, sys, tempfile, time, urllib.request

          version = os.environ["VERSION"].lstrip("v")
          api = f"https://pypi.org/pypi/maverick-agent/{version}/json"

          # PyPI's index can lag a publish by a minute or two -- retry before failing.
          data = None
          for attempt in range(10):
              try:
                  with urllib.request.urlopen(api, timeout=30) as r:
                      data = json.load(r)
                  break
              except Exception as e:  # noqa: BLE001 -- transient index/propagation
                  print(f"PyPI not ready yet ({e}); retry {attempt + 1}/10")
                  time.sleep(15)
          if data is None:
              raise SystemExit(f"maverick-agent=={version} not found on PyPI")

          sdist = next(u for u in data["urls"] if u["packagetype"] == "sdist")
          url, sha = sdist["url"], sdist["digests"]["sha256"]

          with tempfile.TemporaryDirectory() as tmp:
              tmp_path = pathlib.Path(tmp)
              input_path = tmp_path / "requirements.in"
              output_path = tmp_path / "requirements.txt"
              input_path.write_text(f"maverick-agent[installer]=={version}\n")
              subprocess.run(
                  [
                      sys.executable,
                      "-m",
                      "pip",
                      "install",
                      "pip-tools>=7.4",
                  ],
                  check=True,
              )
              # The JSON metadata check above can succeed a minute or two
              # before the package is resolvable via pip's simple index, so
              # `piptools compile` (which actually resolves + downloads
              # maverick-agent and its deps) can still 404 on propagation lag.
              # Retry it on that transient failure instead of failing the bump.
              compile_cmd = [
                  sys.executable,
                  "-m",
                  "piptools",
                  "compile",
                  "--generate-hashes",
                  "--allow-unsafe",
                  "--resolver=backtracking",
                  "--output-file",
                  str(output_path),
                  str(input_path),
              ]
              last_err = None
              for attempt in range(10):
                  proc = subprocess.run(compile_cmd, capture_output=True, text=True)
                  if proc.returncode == 0:
                      last_err = None
                      break
                  combined = (proc.stdout or "") + (proc.stderr or "")
                  # Only retry the propagation-lag signature; a real resolution
                  # error (bad pin, conflicting deps) should fail fast.
                  if "No matching distribution found" in combined or "404" in combined:
                      last_err = combined
                      print(f"deps not resolvable yet; retry {attempt + 1}/10")
                      time.sleep(15)
                      continue
                  # Non-transient failure: surface it immediately.
                  sys.stderr.write(combined)
                  raise SystemExit(f"piptools compile failed: {proc.returncode}")
              if last_err is not None:
                  sys.stderr.write(last_err)
                  raise SystemExit(
                      f"maverick-agent[installer]=={version} deps not resolvable "
                      "on PyPI after retries"
                  )
              requirements = output_path.read_text()

          # Homebrew already downloads and verifies maverick-agent as the formula
          # source. Keep only its resolved dependencies in the hash-locked
          # requirements file so install does not fetch maverick-agent from PyPI.
          blocks = re.split(r"(?m)(?=^[A-Za-z0-9_.-]+[<=>!~; \[])", requirements)
          dependency_blocks = []
          for block in blocks:
              requirement = block.lstrip().splitlines()[0] if block.lstrip() else ""
              name = re.split(r"[<=>!~; \[]", requirement, maxsplit=1)[0]
              if name.lower().replace("_", "-") == "maverick-agent":
                  continue
              dependency_blocks.append(block)
          requirements = "".join(dependency_blocks).strip() + "\n"

          path = pathlib.Path("deploy/homebrew/maverick.rb")
          text = path.read_text()
          text = re.sub(r'url "[^"]*"', f'url "{url}"', text, count=1)
          text = re.sub(r'sha256 "[0-9a-f]{64}"', f'sha256 "{sha}"', text, count=1)
          text = re.sub(
              r"(?s)__END__\n.*",
              "__END__\n" + requirements,
              text,
              count=1,
          )
          path.write_text(text)
          print(
              f"Pinned maverick.rb to {version} with hash-locked dependencies"
              f"\n  url={url}\n  sha256={sha}"
          )
          PY

      - uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/homebrew-bump
          title: "chore: bump the Homebrew formula to the latest release"
          commit-message: "chore: bump Homebrew formula to the published sdist"
          body: |
            Automated by `homebrew-bump.yml`: pins `deploy/homebrew/maverick.rb`
            to the just-published `maverick-agent` sdist (url + sha256) and
            refreshes the embedded hash-locked dependency requirements.

            After merge, sync the formula to the `homebrew-tap` repo.
          add-paths: deploy/homebrew/maverick.rb
          delete-branch: true
