name: Desktop bundle

# Builds the native Maverick installer (Tauri) for macOS, Windows, and
# Linux. On a version tag (`v*`) the installers are attached to that
# GitHub release, so end users can download and double-click them
# without a GitHub login.
#
# The app needs no prerequisites: pressing "Install Maverick" runs the
# same bootstrap as the one-line installers (it installs Python +
# Maverick for the user).
#
# Status: UNSIGNED. First launch trips SmartScreen (Windows) / Gatekeeper
# (macOS) with an "unknown developer" prompt. Code signing + notarization
# are gated on an Apple Developer Program membership + a Windows signing
# cert.

on:
  workflow_dispatch: {}
  push:
    tags:
      # desktop-v* builds bundles standalone; v* also attaches them to the
      # GitHub Release that release.yml creates for the product version tag.
      - 'desktop-v*'
      - 'v*'

jobs:
  bundle:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-2022
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/installer-desktop
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Linux bundle deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.11.1 --activate

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/installer-desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/installer-desktop/src-tauri/Cargo.toml') }}

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Generate icon variants from source icon
        # Turns the committed src-tauri/icons/icon.png into the
        # platform-specific 32x32 / 128x128 / icns / ico the bundler
        # expects (referenced in tauri.conf.json).
        run: pnpm tauri icon src-tauri/icons/icon.png

      - name: Build bundle (unsigned)
        run: pnpm tauri build

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v7
        with:
          name: maverick-desktop-${{ matrix.target }}
          path: |
            apps/installer-desktop/src-tauri/target/release/bundle/**/*.dmg
            apps/installer-desktop/src-tauri/target/release/bundle/**/*.app
            apps/installer-desktop/src-tauri/target/release/bundle/**/*.msi
            apps/installer-desktop/src-tauri/target/release/bundle/**/*.exe
            apps/installer-desktop/src-tauri/target/release/bundle/**/*.AppImage
            apps/installer-desktop/src-tauri/target/release/bundle/**/*.deb
          if-no-files-found: warn


  attach-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: bundle
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      contents: write   # only this minimal job attaches bundles to the GitHub Release
    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v7
        with:
          path: downloaded-bundles

      - name: Attach bundles to the existing GitHub Release
        # On v* product tags, release.yml is the SOLE creator of the GitHub
        # Release (it has generate_release_notes:true). Do NOT use
        # action-gh-release here -- this job could win the create race and the
        # release would end up with no notes. Instead, wait for release.yml to
        # create the release, then upload the bundles as assets. Same pattern
        # as publish.yml's signature-attach step.
        #
        # NOTE: these desktop bundles are UNSIGNED (no Apple / Azure Trusted
        # Signing certs yet). Signing + notarization is the human's later step.
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          bundles=$(find downloaded-bundles \
            \( -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \
               -o -name '*.AppImage' -o -name '*.deb' \) -type f)
          if [ -z "$bundles" ]; then
            echo "::warning::No desktop bundles found to attach for $TAG."
            exit 0
          fi
          for i in $(seq 1 30); do
            if gh release view "$TAG" >/dev/null 2>&1; then
              gh release upload "$TAG" $bundles --clobber
              echo "Uploaded desktop bundles to release $TAG"
              exit 0
            fi
            echo "Release $TAG not found yet (attempt $i/30); sleeping 10s..."
            sleep 10
          done
          echo "::warning::Release $TAG never appeared after ~5min; desktop bundles remain available as workflow artifacts."
