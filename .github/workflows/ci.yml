name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install 'ruff>=0.5'
      - name: Lint
        run: python -m ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install packages
        run: |
          set -x
          # Install maverick-core first; downstream packages use --no-deps to
          # avoid pip trying to resolve 'maverick>=0.1' from PyPI.
          pip install -e ./packages/maverick-core
          pip install --no-deps -e ./packages/maverick-shield
          pip install --no-deps -e ./packages/maverick-channels
          pip install --no-deps -e ./packages/maverick-dashboard
          pip install --no-deps -e ./packages/maverick-mcp
          pip install --no-deps -e ./apps/installer-cli
          # Runtime deps the --no-deps installs dropped. python-multipart is
          # required by FastAPI for Form() params (used in /chat/send) and
          # must be present at app construction, not just at request time.
          pip install 'questionary>=2.0' 'rich>=13.7'
          pip install 'fastapi>=0.110' 'uvicorn>=0.27' 'jinja2>=3.1' \
                      'httpx>=0.27' 'python-multipart>=0.0.9'
          pip install pytest pytest-asyncio
      - name: Show installed packages
        run: pip list
      - name: Test
        run: pytest -vvs --tb=long

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f deploy/docker/Dockerfile -t maverick:ci .
      - name: Smoke run
        run: docker run --rm maverick:ci --help
