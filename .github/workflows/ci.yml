name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    # Informational while we triage rule conflicts on the ported codebase.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install 'ruff>=0.5'
      - name: Lint
        run: python -m ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install packages
        run: |
          set -x
          pip install -e ./packages/maverick-core
          pip install -e ./packages/maverick-shield
          pip install -e ./packages/maverick-channels
          pip install -e ./apps/installer-cli
          pip install pytest pytest-asyncio
      - name: Show installed packages
        run: pip list
      - name: Test
        run: pytest -vvs --tb=long

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f deploy/docker/Dockerfile -t maverick:ci .
      - name: Smoke run
        run: docker run --rm maverick:ci --help
