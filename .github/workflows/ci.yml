name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install 'ruff>=0.5'
      - name: Lint
        run: python -m ruff check .
      - name: Reject bare `import tomllib` (3.11+ stdlib without 3.10 fallback)
        # Three PRs in a row broke CI on Python 3.10 by importing tomllib
        # without the documented tomli fallback. Catch it here so the
        # mistake fails the lint job in seconds, not 5 minutes into the
        # test matrix on the slowest interpreter.
        #
        # Column-0 match only: the legit pattern indents the import
        # inside a try-block, so anything at column 0 is the mistake.
        run: |
          if grep -rn --include='*.py' -E '^import[[:space:]]+tomllib([[:space:]]|$)' apps packages benchmarks; then
            echo ""
            echo "ERROR: bare 'import tomllib' found above. tomllib is 3.11+ stdlib."
            echo "Use the try/except fallback documented in CLAUDE.md."
            exit 1
          fi

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install packages (so pip-audit sees the real dependency tree)
        run: |
          set -x
          # Mirror the test job's install (minus pytest) so pip-audit audits
          # the actual resolved/installed dependencies, not an empty env.
          pip install -e ./packages/maverick-core
          pip install --no-deps -e ./packages/maverick-shield
          pip install --no-deps -e ./packages/maverick-channels
          pip install --no-deps -e ./packages/maverick-dashboard
          pip install --no-deps -e ./packages/maverick-mcp
          pip install --no-deps -e ./apps/installer-cli
          pip install 'questionary>=2.0' 'rich>=13.7'
          # Install the network-facing deps at the patched floors declared in
          # the package extras, plus twilio (which pulls requests/urllib3), so
          # pip-audit sees the real surface we ship -- not a stale bare env.
          pip install 'fastapi>=0.110' 'uvicorn>=0.27' 'jinja2>=3.1' \
                      'httpx>=0.27' 'python-multipart>=0.0.27' \
                      'starlette>=1.0.1' 'requests>=2.33.0' 'urllib3>=2.7.0' \
                      'pillow>=12.2.0' 'twilio>=9.0'
      - name: pip-audit (known CVEs in dependencies)
        # BLOCKING: the dependency floors are now bumped past every CVE this
        # surfaced (pillow/python-multipart/requests/starlette/urllib3). A new
        # advisory should fail the build and prompt a floor bump -- that's the
        # whole point of the gate. Re-add `|| true` only as a temporary
        # measure if an upstream CVE lands with no fix available yet.
        run: |
          python -m pip install pip-audit
          pip-audit

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install packages
        run: |
          set -x
          # Install maverick-core first; downstream packages use --no-deps to
          # avoid pip trying to resolve 'maverick>=0.1' from PyPI.
          pip install -e ./packages/maverick-core
          pip install --no-deps -e ./packages/maverick-shield
          pip install --no-deps -e ./packages/maverick-channels
          pip install --no-deps -e ./packages/maverick-dashboard
          pip install --no-deps -e ./packages/maverick-mcp
          pip install --no-deps -e ./apps/installer-cli
          # Runtime deps the --no-deps installs dropped. python-multipart is
          # required by FastAPI for Form() params (used in /chat/send) and
          # must be present at app construction, not just at request time.
          pip install 'questionary>=2.0' 'rich>=13.7'
          pip install 'fastapi>=0.110' 'uvicorn>=0.27' 'jinja2>=3.1' \
                      'httpx>=0.27' 'python-multipart>=0.0.9'
          pip install pytest pytest-asyncio
      - name: Show installed packages
        run: pip list
      - name: Test
        run: pytest -vvs --tb=long

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build image
        run: docker build -f deploy/docker/Dockerfile -t maverick:ci .
      - name: Smoke run
        # Beyond --help: dashboard and mcp import maverick-dashboard /
        # maverick-mcp. Before those packages were added to the image they
        # exited 2 ("Install: pip install ..."). These prove they're present.
        run: |
          docker run --rm maverick:ci --help
          docker run --rm maverick:ci dashboard --help
          docker run --rm maverick:ci mcp --help
