name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

# Publishes all six maverick-* packages to PyPI when a `v*` tag is
# pushed. Uses PyPI trusted publishing (OIDC) -- no API tokens stored
# in GitHub secrets. Set up the trusted-publishers config at
# https://pypi.org/manage/account/publishing/ before this workflow
# can succeed.

permissions:
  contents: read
  id-token: write   # for PyPI OIDC

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      built: ${{ steps.list.outputs.dirs }}
      names: ${{ steps.names.outputs.names }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install --upgrade build

      - id: list
        name: Discover packages
        run: |
          set -e
          # Each package directory with a pyproject.toml under packages/
          # or apps/ is a candidate.
          dirs=()
          for d in packages/* apps/*; do
            if [ -f "$d/pyproject.toml" ]; then
              dirs+=("$d")
            fi
          done
          printf 'discovered: %s\n' "${dirs[@]}"
          # Emit as a JSON array for the matrix job.
          echo "dirs=$(printf '%s\n' "${dirs[@]}" | jq -R . | jq -sc .)" >> "$GITHUB_OUTPUT"

      - name: Build all packages
        run: |
          set -e
          mkdir -p dist-all
          for d in packages/* apps/*; do
            if [ -f "$d/pyproject.toml" ]; then
              echo "==> Building $d"
              (cd "$d" && python -m build --outdir ../../dist-all .)
            fi
          done
          ls -la dist-all

      - id: names
        name: List distribution names for the publish matrix
        run: |
          # Distinct dist-name prefixes from the built wheels (underscores,
          # e.g. maverick_agent). Drives one publish job per package so a
          # package without a trusted publisher yet can't abort the rest.
          names=$(ls dist-all/*.whl | sed 's#.*/##; s/-[0-9].*//' | sort -u)
          echo "names=$(printf '%s\n' $names | jq -R . | jq -sc .)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist-all/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # One job per package. fail-fast: false means a package that has no
    # trusted publisher yet (or otherwise 4xx's) fails only its own job --
    # it can't abort the others the way a single `twine upload dist/*` did.
    # Re-running after you register more publishers picks up the rest;
    # skip-existing makes already-published packages a no-op.
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.build.outputs.names) }}
    permissions:
      contents: read
      id-token: write   # PyPI OIDC, per job
    environment:
      name: pypi
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist-all/
      - name: Stage only ${{ matrix.package }}
        run: |
          mkdir -p dist
          cp dist-all/${{ matrix.package }}-* dist/
          ls -la dist/
      - name: Publish ${{ matrix.package }} to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  sign:
    # Sign every built artifact with cosign (keyless via Sigstore OIDC).
    # Signatures + provenance bundles get attached to the GitHub Release.
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write     # release attach
      id-token: write     # Sigstore OIDC
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: sigstore/cosign-installer@v3
      - name: Sign artifacts (keyless)
        run: |
          set -e
          mkdir -p signatures
          for f in dist/*.tar.gz dist/*.whl; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            cosign sign-blob --yes \
              --bundle "signatures/${base}.cosign.bundle" \
              "$f"
          done
          ls -la signatures/
      - name: Attach signatures to the existing release
        id: attach
        # release.yml is the SOLE creator/owner of the GitHub Release (it
        # has generate_release_notes:true). Do NOT use action-gh-release
        # here: this fast `sign` job could win the create race and the
        # release would end up with no notes. Instead, wait for release.yml
        # to create the release, then upload the signatures as assets.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          for i in $(seq 1 30); do
            if gh release view "$TAG" >/dev/null 2>&1; then
              gh release upload "$TAG" signatures/*.cosign.bundle --clobber
              echo "Uploaded signatures to release $TAG"
              echo "uploaded=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Release $TAG not found yet (attempt $i/30); sleeping 10s..."
            sleep 10
          done
          echo "::warning::Release $TAG never appeared after ~5min; uploading signatures as a workflow artifact instead."
          echo "uploaded=false" >> "$GITHUB_OUTPUT"
      - name: Fallback - upload signatures as workflow artifact
        # Runs only when the release never appeared, so the signatures are
        # still retrievable. Never fails the job.
        if: steps.attach.outputs.uploaded == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: signatures
          path: signatures/*.cosign.bundle
          if-no-files-found: warn
