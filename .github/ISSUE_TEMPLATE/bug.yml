name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Before submitting:
          - Run `maverick doctor` and paste the output below
          - Redact any API keys / tokens from your config

  - type: textarea
    id: doctor
    attributes:
      label: maverick doctor output
      description: Paste the full output of `maverick doctor`
      placeholder: |
        Maverick health check
        ✓ config  (~/.maverick/config.toml)
        ✓ anthropic  (key validated)
        ...
      render: shell
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what did you get?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Exact command(s), and the goal title / channel message that triggered it
      render: shell

  - type: textarea
    id: logs
    attributes:
      label: Logs (optional)
      description: |
        Output of `journalctl -u maverick -f` (VPS) or the maverick serve
        process (local). Redact secrets.
      render: shell

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `pip show maverick | grep Version` (or git commit SHA if from source)
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Windows
        - Docker
        - VPS (systemd)
    validations:
      required: true
