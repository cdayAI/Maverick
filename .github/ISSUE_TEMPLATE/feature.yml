name: Feature request
description: Suggest a capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not the implementation. "I want X so I can Y".
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: How would you implement it? Which package would it touch?

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - agent kernel
        - LLM providers
        - channels
        - sandbox
        - shield / safety
        - skills
        - installer / wizard
        - dashboard
        - MCP server
        - deployment (Docker/VPS/Tauri)
        - docs

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds exist today? Why aren't they enough?
